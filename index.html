<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner - Live</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">SmartStudy Live</a>
            <div class="ms-auto">
                <button id="darkModeToggle" class="btn btn-sm btn-outline-light">Toggle Dark Mode</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="authSection" class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center">Welcome</h3>
                        <p class="text-center text-muted">Enter a name to start (Saved locally)</p>
                        <div class="mb-3">
                            <input type="text" id="usernameInput" class="form-control" placeholder="Your Name">
                        </div>
                        <button id="loginBtn" class="btn btn-primary w-100">Start Planning</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="mainDashboard" class="row d-none">
            <!-- Sidebar / Stats -->
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h4>Hello, <span id="displayName">User</span>!</h4>
                        <p id="motivationalMsg" class="text-muted italic"></p>
                        <hr>
                        <h5>Progress</h5>
                        <div class="progress mb-2" style="height: 25px;">
                            <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%;">0%</div>
                        </div>
                        <p id="progressText">Completed: 0 | Pending: 0</p>
                    </div>
                </div>

                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5>Weekly Progress</h5>
                        <canvas id="progressChart"></canvas>
                    </div>
                </div>

                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5>Pomodoro Timer</h5>
                        <div class="text-center">
                            <h2 id="timerDisplay">25:00</h2>
                            <button id="startTimer" class="btn btn-success">Start</button>
                            <button id="pauseTimer" class="btn btn-warning">Pause</button>
                            <button id="resetTimer" class="btn btn-danger">Reset</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>Today's Tasks</h3>
                    <div>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTaskModal">Add Task</button>
                        <button id="generatePlanBtn" class="btn btn-outline-success">Smart Generate Plan</button>
                    </div>
                </div>

                <div id="taskList" class="list-group shadow-sm mb-4">
                    <!-- Tasks will be injected here -->
                </div>

                <div class="mt-4">
                    <h4>AI Recommendations</h4>
                    <div id="recommendations" class="alert alert-light border">
                        Analyzing your workload...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal fade" id="addTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" id="taskSubject" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Task Title</label>
                        <input type="text" id="taskTitle" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Deadline</label>
                        <input type="date" id="taskDeadline" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Difficulty</label>
                        <select id="taskDifficulty" class="form-select">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Priority (1-High, 3-Low)</label>
                        <input type="number" id="taskPriority" class="form-control" min="1" max="3" value="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estimated Hours</label>
                        <input type="number" step="0.5" id="taskHours" class="form-control" value="1">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button id="saveTaskBtn" class="btn btn-primary">Save Task</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
